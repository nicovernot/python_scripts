# strategies.yml
# Fichier de configuration pour les stratégies de génération de grilles Loto.
# Vous pouvez ajouter, modifier ou supprimer des stratégies ici.
# La somme des poids (sauf la pénalité) n'a pas besoin de faire 1.0, ils sont relatifs.

strategies:
  equilibre:
    description: "Stratégie équilibrée combinant tous les facteurs statistiques"
    weights:
      frequency: 0.25
      recency_gap: 0.20
      momentum: 0.15
      hot_cold: 0.10
      frequent_pairs: 0.15
      ml_boost: 0.10
      recent_draws_penalty: 0.30

  focus_retard:
    description: "Privilégie les numéros en retard avec un fort écart par rapport à leur moyenne"
    weights:
      frequency: 0.15
      recency_gap: 0.40
      momentum: 0.05
      hot_cold: 0.05
      frequent_pairs: 0.10
      ml_boost: 0.20
      recent_draws_penalty: 0.60

  focus_frequence:
    description: "Met l'accent sur les numéros les plus fréquents historiquement"
    weights:
      frequency: 0.45
      recency_gap: 0.10
      momentum: 0.15
      hot_cold: 0.15
      frequent_pairs: 0.10
      ml_boost: 0.05
      recent_draws_penalty: 0.20

  momentum_fort:
    description: "Privilégie les numéros avec une forte dynamique récente"
    weights:
      frequency: 0.15
      recency_gap: 0.10
      momentum: 0.40
      hot_cold: 0.10
      frequent_pairs: 0.15
      ml_boost: 0.10
      recent_draws_penalty: 0.10

  paires_optimales:
    description: "Se concentre sur les paires de numéros les plus performantes"
    weights:
      frequency: 0.20
      recency_gap: 0.15
      momentum: 0.10
      hot_cold: 0.10
      frequent_pairs: 0.35
      ml_boost: 0.10
      recent_draws_penalty: 0.25

  contrarian:
    description: "Stratégie contrarian qui privilégie les numéros délaissés"
    weights:
      frequency: 0.05
      recency_gap: 0.35
      momentum: 0.05
      hot_cold: 0.30
      frequent_pairs: 0.05
      ml_boost: 0.15
      recent_draws_penalty: 0.70

  machine_learning:
    description: "Stratégie basée principalement sur les prédictions ML"
    weights:
      frequency: 0.10
      recency_gap: 0.15
      momentum: 0.10
      hot_cold: 0.05
      frequent_pairs: 0.10
      ml_boost: 0.45
      recent_draws_penalty: 0.25

  conservateur:
    description: "Approche conservatrice évitant les extrêmes"
    weights:
      frequency: 0.30
      recency_gap: 0.25
      momentum: 0.20
      hot_cold: 0.15
      frequent_pairs: 0.10
      ml_boost: 0.00
      recent_draws_penalty: 0.40

  agressif:
    description: "Stratégie agressive avec prise de risque élevée"
    weights:
      frequency: 0.10
      recency_gap: 0.30
      momentum: 0.25
      hot_cold: 0.05
      frequent_pairs: 0.05
      ml_boost: 0.25
      recent_draws_penalty: 0.10

  adaptative:
    description: "Stratégie qui s'adapte aux tendances récentes du jeu"
    weights:
      frequency: 0.20
      recency_gap: 0.20
      momentum: 0.30
      hot_cold: 0.10
      frequent_pairs: 0.10
      ml_boost: 0.10
      recent_draws_penalty: 0.35